services:
  libreoffice-converter:
    build:
      context: ./docker/libreoffice-converter
    platform: linux/amd64
    ports:
      - "5001:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
