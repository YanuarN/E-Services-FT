name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: E-Services-FT

    steps:
      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd /var/www/E-Services-FT

            # Enable maintenance mode to prevent requests during deployment
            php artisan down --retry=30

            git pull origin main
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build

            php artisan migrate --force

            # Clear all caches
            php artisan optimize:clear
            php artisan filament:optimize-clear
            rm -rf bootstrap/cache/filament/

            # Rebuild all caches
            php artisan package:discover
            php artisan filament:assets
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache
            php artisan view:cache
            php artisan filament:optimize

            # Restart services after all caches are warmed
            systemctl restart php8.3-fpm
            systemctl restart nginx

            # Bring application back online
            php artisan up
